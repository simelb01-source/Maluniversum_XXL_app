<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maluniversum XXL</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #header {
        height: 50px;
        background: #222;
        color: white;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 10px;
    }

    button {
        padding: 8px 12px;
        border: none;
        background: #444;
        color: white;
        cursor: pointer;
        border-radius: 4px;
    }

    button:hover {
        background: #666;
    }

    #colorPicker {
        position: absolute;
        left: 10px;
        top: 70px;
        height: 300px;
    }

    #etsyLink {
        margin-left: auto;
        color: yellow;
        font-weight: bold;
        text-decoration: none;
    }

    #etsyLink:hover {
        color: orange;
    }

    canvas {
        display: block;
        background: white;
    }
</style>
</head>
<body>

<div id="header">
    <button onclick="setTool('pen')">Stift</button>
    <button onclick="setTool('eraser')">Radierer</button>
    <button onclick="setTool('rainbow')">Regenbogen</button>
    <button onclick="setTool('spray')">Spray</button>
    <button onclick="undo()">Undo</button>
    <button onclick="redo()">Redo</button>
    <button onclick="addEmoji()">Emoji</button>
    <button onclick="addHeart()">Herz</button>
    <button onclick="addTaxi()">Taxi</button>
    <button onclick="clearCanvas()">Alles löschen</button>
    <button onclick="saveImage()">Speichern</button>

    <a id="etsyLink" href="https://www.etsy.com/ch/shop/Maluniversum" target="_blank">
        Mein Etsy‑Shop
    </a>
</div>

<input type="color" id="colorPicker" value="#ff0000">

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let drawing = false;
let tool = "pen";
let color = "#ff0000";
let rainbowHue = 0;

let undoStack = [];
let redoStack = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 50;
}
resizeCanvas();
window.onresize = resizeCanvas;

document.getElementById("colorPicker").oninput = (e) => {
    color = e.target.value;
};

canvas.onmousedown = (e) => {
    drawing = true;
    saveState();
    draw(e);
};

canvas.onmouseup = () => drawing = false;
canvas.onmouseleave = () => drawing = false;

canvas.onmousemove = draw;

function draw(e) {
    if (!drawing) return;

    const x = e.clientX;
    const y = e.clientY - 50;

    if (tool === "pen") {
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.lineTo(x, y);
        ctx.stroke();
    }

    if (tool === "eraser") {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 20;
        ctx.lineTo(x, y);
        ctx.stroke();
    }

    if (tool === "rainbow") {
        rainbowHue = (rainbowHue + 2) % 360;
        ctx.strokeStyle = `hsl(${rainbowHue}, 100%, 50%)`;
        ctx.lineWidth = 5;
        ctx.lineTo(x, y);
        ctx.stroke();
    }

    if (tool === "spray") {
        for (let i = 0; i < 20; i++) {
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            ctx.fillStyle = color;
            ctx.fillRect(x + offsetX, y + offsetY, 2, 2);
        }
    }

    ctx.beginPath();
    ctx.moveTo(x, y);
}

function setTool(t) {
    tool = t;
    ctx.beginPath();
}

function addEmoji() {
    ctx.font = "40px Arial";
    ctx.fillText("😊", 100, 100);
}

function addHeart() {
    ctx.font = "40px Arial";
    ctx.fillText("❤️", 160, 100);
}

function addTaxi() {
    ctx.font = "40px Arial";
    ctx.fillText("🚕", 220, 100);
}

function clearCanvas() {
    saveState();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveImage() {
    const link = document.createElement("a");
    link.download = "Maluniversum.png";
    link.href = canvas.toDataURL();
    link.click();
}

function saveState() {
    undoStack.push(canvas.toDataURL());
    redoStack = [];
}

function undo() {
    if (undoStack.length === 0) return;
    redoStack.push(canvas.toDataURL());
    restoreState(undoStack.pop());
}

function redo() {
    if (redoStack.length === 0) return;
    undoStack.push(canvas.toDataURL());
    restoreState(redoStack.pop());
}

function restoreState(dataUrl) {
    const img = new Image();
    img.src = dataUrl;
    img.onload = () => ctx.drawImage(img, 0, 0);
}
</script>

</body>
</html>
